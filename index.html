<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XENARO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
<style>
/* ==========================
   XENARO
   Black & White Theme
========================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

html, body{
    height:100%;
}

body{
    font-family:'Poppins',sans-serif;
    background:#0a0a0a;
    color:#f5f5f5;
    overflow:hidden;
}

::-webkit-scrollbar{
    width:10px;
}
::-webkit-scrollbar-track{
    background:#0f0f0f;
}
::-webkit-scrollbar-thumb{
    background:#ffffff;
    border-radius:100px;
}

#loader{
position:fixed;
inset:0;
background:#000000;
display:flex;
justify-content:center;
align-items:center;
z-index:99999;
transition:1s;
}

.loader-logo{
font-size:60px;
font-weight:800;
letter-spacing:10px;
color:#00cfff;
animation:pulse 1.2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);text-shadow:0 0 20px #00cfff,0 0 50px #00cfff;}
100%{transform:scale(1);}
}

header{
position:fixed;
top:0;
left:0;
width:100%;
height:64px;
z-index:500;
backdrop-filter:blur(18px);
background:rgba(0,0,0,.5);
border-bottom:1px solid rgba(255,255,255,.12);
}

nav{
max-width:1680px;
height:100%;
margin:auto;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 clamp(24px,4vw,64px);
}

.logo{
font-size:24px;
font-weight:800;
letter-spacing:2px;
color:#00cfff;
text-shadow:0 0 12px #00cfff, 0 0 30px rgba(0,207,255,.6);
}

nav ul{
display:flex;
list-style:none;
gap:30px;
}
nav a{
color:#f5f5f5;
text-decoration:none;
font-weight:500;
font-size:14px;
transition:.35s;
}
nav a:hover{
color:#ffffff;
opacity:.7;
}

.join-btn{
padding:9px 20px;
background:#ffffff;
border-radius:40px;
color:#000000;
font-weight:700;
font-size:14px;
transition:.4s;
}
.join-btn:hover{
transform:translateY(-3px);
box-shadow:0 0 30px rgba(255,255,255,.5);
}

/* ---- One-page layout ---- */

.page{
height:100vh;
padding-top:64px;
display:flex;
flex-direction:column;
max-width:1680px;
margin:auto;
position:relative;
}

.page::before{
content:'';
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:url('blackhole4.png');
background-size:cover;
background-repeat:no-repeat;
background-position:center right;
z-index:0;
pointer-events:none;
opacity:0.95;
}

.top-row{
flex:1;
min-height:0;
display:flex;
align-items:center;
padding:2vh clamp(24px,4vw,64px);
z-index:100;
position:relative;
}

.hero-left{
flex:1;
max-width:50%;
}

.hero h1{
font-size:clamp(30px,4.2vw,60px);
line-height:1.05;
font-weight:800;
margin-bottom:14px;
}

.hero p{
font-size:clamp(13px,1.4vw,19px);
opacity:.7;
}

.hero-right{
display:none;
}

.card-section{
flex:0.8;
display:flex;
align-items:center;
justify-content:flex-start;
padding:0 clamp(24px,4vw,64px);
z-index:100;
position:relative;
}

.card-section .glass-card{
max-width:380px;
width:100%;
}

.glass-card{
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.12);
border-radius:22px;
padding:clamp(20px,3vh,32px);
backdrop-filter:blur(30px);
box-shadow:
    0 0 40px rgba(255,255,255,.1),
    0 25px 60px rgba(0,0,0,.55);
transition:box-shadow .3s ease, transform .1s ease-out;
transform-style:preserve-3d;
will-change:transform;
}
.glass-card:hover{
box-shadow:
    0 0 55px rgba(0,207,255,.18),
    0 35px 70px rgba(0,0,0,.6);
}

.card-layer{
transform-style:preserve-3d;
}

.glass-card h2{
font-size:clamp(20px,2.4vw,30px);
margin-bottom:4px;
transform:translateZ(45px);
text-shadow:0 8px 20px rgba(0,0,0,.5);
}

.glass-card > .card-layer > p{
font-size:13px;
opacity:.65;
transform:translateZ(35px);
}

.stats{
display:flex;
justify-content:space-between;
margin-top:20px;
transform:translateZ(30px);
}
.stats h3{
font-size:clamp(18px,2vw,26px);
color:#ffffff;
}
.stats span{
opacity:.6;
font-size:12px;
}

.bottom-row{
flex:.6;
min-height:0;
display:flex;
align-items:center;
justify-content:center;
padding:0 clamp(24px,4vw,64px);
z-index:100;
position:relative;
}

.social-links{
display:flex;
gap:22px;
align-items:center;
justify-content:center;
}

.social-link{
display:flex;
align-items:center;
gap:10px;
padding:12px 22px;
border-radius:40px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.15);
color:#f5f5f5;
font-size:16px;
text-decoration:none;
transition:.35s;
}
.social-link span{
font-size:14px;
font-weight:500;
}
.social-link:hover{
transform:translateY(-5px);
color:#00cfff;
border-color:#00cfff;
box-shadow:0 0 25px rgba(0,207,255,.4);
}

footer{
flex:0 0 auto;
padding:10px;
text-align:center;
border-top:1px solid rgba(255,255,255,.12);
color:#999;
font-size:11px;
z-index:100;
position:relative;
}
footer h2{
font-size:13px;
margin-bottom:2px;
color:#f5f5f5;
}

@media(max-width:900px){
html, body{
height:auto;
overflow-x:hidden;
overflow-y:auto;
}
.page{
height:auto;
padding-top:60px;
}

header{
height:56px;
}
nav{
padding:0 20px;
}
.logo{
font-size:19px;
}
.join-btn{
padding:7px 16px;
font-size:12.5px;
}
nav ul{
display:none;
}

.top-row{
flex-direction:column;
text-align:center;
padding:28px 20px 24px;
}

.hero-left{
max-width:100%;
}
.hero h1{
font-size:34px;
letter-spacing:-.5px;
}
.hero p{
font-size:14px;
line-height:1.5;
max-width:320px;
margin:0 auto;
}

.hero-right{
perspective:none;
}
.glass-card{
padding:22px 18px;
border-radius:20px;
}
.glass-card:hover{
box-shadow:
    0 0 40px rgba(255,255,255,.1),
    0 25px 60px rgba(0,0,0,.55);
}
.glass-card h2{
font-size:21px;
transform:none;
}
.glass-card > .card-layer > p{
transform:none;
}

.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
margin-top:18px;
padding-top:18px;
border-top:1px solid rgba(255,255,255,.1);
transform:none;
}
.stats > div{
display:flex;
flex-direction:column;
align-items:center;
}
.stats h3{
font-size:19px;
}
.stats span{
font-size:10.5px;
letter-spacing:.2px;
white-space:nowrap;
}

.card-section{
padding:0 20px;
justify-content:center;
}

.card-section .glass-card{
max-width:100%;
}

.bottom-row{
padding:8px 20px 28px;
}

.page::before{
display:none;
}
.social-links{
display:flex;
flex-wrap:wrap;
gap:12px;
justify-content:center;
align-items:center;
max-width:360px;
margin:0 auto;
}
.social-link{
padding:12px 18px;
justify-content:center;
font-size:14px;
}
.social-link span{
font-size:13px;
}

footer{
padding:16px 20px;
}
}


</style>
</head>
<body>
<div id="loader">
<div class="loader-logo">
XENARO
</div>
</div>
<div id="particles" style="position:fixed;width:100%;height:100%;top:0;left:0;z-index:5;pointer-events:none;"></div>
<header>
<nav>
<div class="logo">
XENARO
</div>
<a class="join-btn" href="https://discord.gg/C64h96EGR7" target="_blank" rel="noopener">
Join Now
</a>
</nav>
</header>
<div class="page">

<section class="top-row" id="home">
<div class="hero-left">
<h1>
SCOPE, AIM, SHOOT!
</h1>
<p>
simple sa ladka hu,<br>game khel ke khush ho jata hu :)
</p>
</div>
<div class="hero-right">
</div>
</section>

<section class="card-section">
<div class="glass-card" id="mainCard">
<div class="card-layer">
<h2>XENARO.69</h2>
<p>
Gaming Creator
</p>
<div class="stats">
<div>
<h3>1000+</h3>
<span>Subscribers</span>
</div>
<div>
<h3>300+</h3>
<span>Videos</span>
</div>
<div>
<h3>375K+</h3>
<span>Views</span>
</div>
</div>
</div>
</div>
</section>

<div class="bottom-row">
<div class="social-links">
<a href="https://www.youtube.com/@xenaro.69" target="_blank" rel="noopener" class="social-link"><i class="fa-brands fa-youtube"></i><span>YouTube</span></a>
<a href="https://www.instagram.com/xenaro.69/" target="_blank" rel="noopener" class="social-link"><i class="fa-brands fa-instagram"></i><span>Instagram</span></a>
<a href="https://discord.gg/C64h96EGR7" target="_blank" rel="noopener" class="social-link"><i class="fa-brands fa-discord"></i><span>Discord</span></a>
<a href="https://x.com/xenaro_69" target="_blank" rel="noopener" class="social-link"><i class="fa-brands fa-twitter"></i><span>Twitter</span></a>
</div>
</div>

<footer>
<h2>
XENARO
</h2>
<p>
© 2026 All Rights Reserved.
</p>
</footer>

</div>
<script>
// =========================
// XENARO
// Premium Script
// =========================

window.addEventListener("load", () => {
    setTimeout(() => {
        document.getElementById("loader").style.opacity = "0";
        document.getElementById("loader").style.pointerEvents = "none";
    },1200);
});

const header = document.querySelector("header");
window.addEventListener("scroll",()=>{
    if(window.scrollY>50){
        header.style.background="rgba(0,0,0,.8)";
    }
    else{
        header.style.background="rgba(0,0,0,.5)";
    }
});

// Glow effect removed for cleaner look

const particleContainer=document.getElementById("particles");
function createParticle(){
const p=document.createElement("span");
const size=Math.random()*6+2;
p.style.position="absolute";
p.style.width=size+"px";
p.style.height=size+"px";
p.style.borderRadius="50%";
p.style.background="#ffffff";
p.style.opacity=Math.random()*0.6;
p.style.left=Math.random()*100+"vw";
p.style.top="110vh";
p.style.boxShadow="0 0 20px rgba(255,255,255,.6)";
particleContainer.appendChild(p);
const speed=Math.random()*5+6;
let y=110;
const move=setInterval(()=>{
y-=0.2;
p.style.top=y+"vh";
if(y<-10){
clearInterval(move);
p.remove();
}
},speed);
}
setInterval(createParticle,120);

// Reveal animation: since the whole site now fits on one screen
// with no scrolling, fade everything in on load instead of on scroll.
document.querySelectorAll("section").forEach((section,i)=>{
section.style.opacity="0";
section.style.transform="translateY(30px)";
section.style.transition=".7s";
setTimeout(()=>{
section.style.opacity="1";
section.style.transform="translateY(0px)";
},150+i*120);
});

const hero=document.querySelector(".hero-left h1");
if(hero){
hero.animate([
{
opacity:0,
transform:"translateY(40px)"
},
{
opacity:1,
transform:"translateY(0px)"
}
],{
duration:1200,
fill:"forwards"
});
}

document.querySelectorAll("button,a").forEach(btn=>{
btn.addEventListener("mouseenter",()=>{
btn.style.transition=".3s";
btn.style.transform="translateY(-4px) scale(1.02)";
});
btn.addEventListener("mouseleave",()=>{
btn.style.transform="translateY(0px) scale(1)";
});
});

// Random background gradient removed for stability

document.querySelectorAll(".glass-card").forEach(card=>{
card.addEventListener("mousemove",(e)=>{
const rect=card.getBoundingClientRect();
const x=e.clientX-rect.left;
const y=e.clientY-rect.top;
const rx=(y-rect.height/2)/18;
const ry=(rect.width/2-x)/18;
card.style.transform=
`perspective(1200px) rotateX(${rx}deg) rotateY(${ry}deg) scale3d(1.02,1.02,1.02)`;
});
card.addEventListener("mouseleave",()=>{
card.style.transform="perspective(1200px) rotateX(0deg) rotateY(0deg) scale3d(1,1,1)";
});
});


</script>
</body>
</html>
