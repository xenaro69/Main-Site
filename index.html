<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XENARO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
<style>
/* ==========================
   XENARO
   Black & White Theme
========================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

html, body{
    height:100%;
}

body{
    font-family:'Poppins',sans-serif;
    background:#0a0a0a;
    color:#f5f5f5;
    overflow:hidden;
}

::-webkit-scrollbar{
    width:10px;
}
::-webkit-scrollbar-track{
    background:#0f0f0f;
}
::-webkit-scrollbar-thumb{
    background:#ffffff;
    border-radius:100px;
}

#loader{
position:fixed;
inset:0;
background:#000000;
display:flex;
justify-content:center;
align-items:center;
z-index:99999;
transition:1s;
}

.loader-logo{
font-size:60px;
font-weight:800;
letter-spacing:10px;
color:#00cfff;
animation:pulse 1.2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);text-shadow:0 0 20px #00cfff,0 0 50px #00cfff;}
100%{transform:scale(1);}
}

header{
position:fixed;
top:0;
left:0;
width:100%;
height:64px;
z-index:500;
backdrop-filter:blur(18px);
background:rgba(0,0,0,.5);
border-bottom:1px solid rgba(255,255,255,.12);
}

nav{
max-width:1300px;
height:100%;
margin:auto;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 40px;
}

.logo{
font-size:24px;
font-weight:800;
letter-spacing:2px;
color:#00cfff;
text-shadow:0 0 12px #00cfff, 0 0 30px rgba(0,207,255,.6);
}

nav ul{
display:flex;
list-style:none;
gap:30px;
}
nav a{
color:#f5f5f5;
text-decoration:none;
font-weight:500;
font-size:14px;
transition:.35s;
}
nav a:hover{
color:#ffffff;
opacity:.7;
}

.join-btn{
padding:9px 20px;
background:#ffffff;
border-radius:40px;
color:#000000;
font-weight:700;
font-size:14px;
transition:.4s;
}
.join-btn:hover{
transform:translateY(-3px);
box-shadow:0 0 30px rgba(255,255,255,.5);
}

/* ---- One-page layout ---- */

.page{
height:100vh;
padding-top:64px;
display:flex;
flex-direction:column;
max-width:1300px;
margin:auto;
}

.top-row{
flex:1.15;
min-height:0;
display:grid;
grid-template-columns:1.1fr .9fr;
align-items:center;
gap:clamp(20px,3vw,60px);
padding:1.5vh 40px;
}

.hero h1{
font-size:clamp(30px,4.2vw,56px);
line-height:1.05;
font-weight:800;
margin-bottom:14px;
}

.hero p{
font-size:clamp(13px,1.4vw,18px);
opacity:.7;
}

.hero-right{
perspective:1200px;
}

.glass-card{
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.12);
border-radius:22px;
padding:clamp(20px,3vh,32px);
backdrop-filter:blur(30px);
box-shadow:
    0 0 40px rgba(255,255,255,.1),
    0 25px 60px rgba(0,0,0,.55);
transition:box-shadow .3s ease, transform .1s ease-out;
transform-style:preserve-3d;
will-change:transform;
}
.glass-card:hover{
box-shadow:
    0 0 55px rgba(0,207,255,.18),
    0 35px 70px rgba(0,0,0,.6);
}

.card-layer{
transform-style:preserve-3d;
}

.glass-card h2{
font-size:clamp(20px,2.4vw,30px);
margin-bottom:4px;
transform:translateZ(45px);
text-shadow:0 8px 20px rgba(0,0,0,.5);
}

.glass-card > .card-layer > p{
font-size:13px;
opacity:.65;
transform:translateZ(35px);
}

.stats{
display:flex;
justify-content:space-between;
margin-top:20px;
transform:translateZ(30px);
}
.stats h3{
font-size:clamp(18px,2vw,26px);
color:#ffffff;
}
.stats span{
opacity:.6;
font-size:12px;
}

.bottom-row{
flex:.6;
min-height:0;
display:flex;
align-items:center;
justify-content:center;
padding:0 40px;
}

.social-links{
display:flex;
gap:22px;
align-items:center;
justify-content:center;
}

.social-link{
display:flex;
align-items:center;
gap:10px;
padding:12px 22px;
border-radius:40px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.15);
color:#f5f5f5;
font-size:16px;
text-decoration:none;
transition:.35s;
}
.social-link span{
font-size:14px;
font-weight:500;
}
.social-link:hover{
transform:translateY(-5px);
color:#00cfff;
border-color:#00cfff;
box-shadow:0 0 25px rgba(0,207,255,.4);
}

footer{
flex:0 0 auto;
padding:10px;
text-align:center;
border-top:1px solid rgba(255,255,255,.12);
color:#999;
font-size:11px;
}
footer h2{
font-size:13px;
margin-bottom:2px;
color:#f5f5f5;
}

@media(max-width:900px){
html, body{
height:auto;
overflow-x:hidden;
overflow-y:auto;
}
.page{
height:auto;
padding-top:60px;
}

header{
height:56px;
}
nav{
padding:0 20px;
}
.logo{
font-size:19px;
}
.join-btn{
padding:7px 16px;
font-size:12.5px;
}
nav ul{
display:none;
}

.top-row{
grid-template-columns:1fr;
text-align:center;
padding:28px 20px 24px;
gap:26px;
}
.hero h1{
font-size:34px;
letter-spacing:-.5px;
}
.hero p{
font-size:14px;
line-height:1.5;
max-width:320px;
margin:0 auto;
}

.hero-right{
perspective:none;
}
.glass-card{
padding:22px 18px;
border-radius:20px;
}
.glass-card:hover{
box-shadow:
    0 0 40px rgba(255,255,255,.1),
    0 25px 60px rgba(0,0,0,.55);
}
.glass-card h2{
font-size:21px;
transform:none;
}
.glass-card > .card-layer > p{
transform:none;
}

.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
margin-top:18px;
padding-top:18px;
border-top:1px solid rgba(255,255,255,.1);
transform:none;
}
.stats > div{
display:flex;
flex-direction:column;
align-items:center;
}
.stats h3{
font-size:19px;
}
.stats span{
font-size:10.5px;
letter-spacing:.2px;
white-space:nowrap;
}

.bottom-row{
padding:8px 20px 28px;
}
.social-links{
display:flex;
flex-wrap:wrap;
gap:12px;
justify-content:center;
align-items:center;
max-width:360px;
margin:0 auto;
}
.social-link{
padding:12px 18px;
justify-content:center;
font-size:14px;
}
.social-link span{
font-size:13px;
}

footer{
padding:16px 20px;
}
}

/* Custom cursor */
.xn-cursor{
    position:fixed;
    top:0;
    left:0;
    width:26px;
    height:26px;
    margin:-13px 0 0 -13px;
    border-radius:50%;
    border:1.5px solid #00cfff;
    pointer-events:none;
    z-index:999999;
    opacity:0;
    display:none;
    transition:opacity .25s ease, width .2s ease, height .2s ease, margin .2s ease, background .2s ease;
    will-change:transform;
}
.xn-cursor::after{
    content:"";
    position:absolute;
    top:50%;
    left:50%;
    width:4px;
    height:4px;
    background:#00cfff;
    border-radius:50%;
    transform:translate(-50%,-50%);
    box-shadow:0 0 8px #00cfff, 0 0 16px rgba(0,207,255,.7);
}
.xn-cursor.is-visible{
    opacity:1;
}
.xn-cursor.is-active{
    width:20px;
    height:20px;
    margin:-10px 0 0 -10px;
    border-color:#7d4dff;
}
.xn-cursor.is-hover{
    width:52px;
    height:52px;
    margin:-26px 0 0 -26px;
    background:rgba(0,207,255,.08);
    border-color:#00cfff;
    box-shadow:0 0 25px rgba(0,207,255,.35);
}
html.xn-has-cursor *{
    cursor:none;
}
html.xn-has-cursor .xn-cursor{
    display:block;
}
</style>
</head>
<body>
<div class="xn-cursor" id="xnCursor"></div>
<div id="loader">
<div class="loader-logo">
XENARO
</div>
</div>
<div id="particles"></div>
<header>
<nav>
<div class="logo">

<a class="join-btn" href="https://discord.gg/C64h96EGR7" target="_blank" rel="noopener">

</a>
</nav>
</header>
<div class="page">

<section class="top-row" id="home">
<div class="hero-left">
<h1>
SCOPE, AIM, SHOOT!
</h1>
<p>
simple sa ladka hu,<br>game khel ke khush ho jata hu :)

</div>
<div class="hero-right">

Gaming Creator
</p>

<h3>1000+</h3>

<span>Videos</span>

<h3>375K+</h3>
<span>Views</span>

</div>

<div class="bottom-row">

</div>
<script>
// =========================
// XENARO
// Premium Script
// =========================

window.addEventListener("load", () => {
    setTimeout(() => {
        document.getElementById("loader").style.opacity = "0";
        document.getElementById("loader").style.pointerEvents = "none";
    },1200);
});

const header = document.querySelector("header");
window.addEventListener("scroll",()=>{
    if(window.scrollY>50){
        header.style.background="rgba(0,0,0,.8)";
    }
    else{
        header.style.background="rgba(0,0,0,.5)";
    }
});

const glow=document.createElement("div");
glow.style.position="fixed";
glow.style.width="350px";
glow.style.height="350px";
glow.style.borderRadius="50%";
glow.style.pointerEvents="none";
glow.style.background="radial-gradient(circle, rgba(255,255,255,.1), transparent 70%)";
glow.style.transform="translate(-50%,-50%)";
glow.style.zIndex="-1";
document.body.appendChild(glow);
window.addEventListener("mousemove",(e)=>{
glow.style.left=e.clientX+"px";
glow.style.top=e.clientY+"px";
});

const particleContainer=document.getElementById("particles");
function createParticle(){
const p=document.createElement("span");
const size=Math.random()*6+2;
p.style.position="absolute";
p.style.width=size+"px";
p.style.height=size+"px";
p.style.borderRadius="50%";
p.style.background="#ffffff";
p.style.opacity=Math.random()*0.6;
p.style.left=Math.random()*100+"vw";
p.style.top="110vh";
p.style.boxShadow="0 0 20px rgba(255,255,255,.6)";
particleContainer.appendChild(p);
const speed=Math.random()*5+6;
let y=110;
const move=setInterval(()=>{
y-=0.2;
p.style.top=y+"vh";
if(y<-10){
clearInterval(move);
p.remove();
}
},speed);
}
setInterval(createParticle,120);

// Reveal animation: since the whole site now fits on one screen
// with no scrolling, fade everything in on load instead of on scroll.
document.querySelectorAll("section").forEach((section,i)=>{
section.style.opacity="0";
section.style.transform="translateY(30px)";
section.style.transition=".7s";
setTimeout(()=>{
section.style.opacity="1";
section.style.transform="translateY(0px)";
},150+i*120);
});

const hero=document.querySelector(".hero h1");
hero.animate([
{
opacity:0,
transform:"translateY(40px)"
},
{
opacity:1,
transform:"translateY(0px)"
}
],{
duration:1200,
fill:"forwards"
});

document.querySelectorAll("button,a").forEach(btn=>{
btn.addEventListener("mouseenter",()=>{
btn.style.transition=".3s";
btn.style.transform="translateY(-4px) scale(1.02)";
});
btn.addEventListener("mouseleave",()=>{
btn.style.transform="translateY(0px) scale(1)";
});
});

setInterval(()=>{
document.body.style.background=
`radial-gradient(circle at ${Math.random()*100}% ${Math.random()*100}%,
rgba(255,255,255,.05),
#0a0a0a 60%)`;
},5000);

document.querySelectorAll(".glass-card").forEach(card=>{
card.addEventListener("mousemove",(e)=>{
const rect=card.getBoundingClientRect();
const x=e.clientX-rect.left;
const y=e.clientY-rect.top;
const rx=(y-rect.height/2)/18;
const ry=(rect.width/2-x)/18;
card.style.transform=
`perspective(1200px) rotateX(${rx}deg) rotateY(${ry}deg) scale3d(1.02,1.02,1.02)`;
});
card.addEventListener("mouseleave",()=>{
card.style.transform="perspective(1200px) rotateX(0deg) rotateY(0deg) scale3d(1,1,1)";
});
});

// ---------------- Custom Cursor ----------------
(function(){
    const cursor = document.getElementById("xnCursor");
    let targetX = window.innerWidth / 2;
    let targetY = window.innerHeight / 2;
    let currentX = targetX;
    let currentY = targetY;
    let active = false;
    let loopStarted = false;

    function activate(){
        if(active) return;
        active = true;
        document.documentElement.classList.add("xn-has-cursor");
        cursor.classList.add("is-visible");
        if(!loopStarted){
            loopStarted = true;
            loop();
        }
        document.querySelectorAll("a, button").forEach(el=>{
            el.addEventListener("mouseenter",()=> cursor.classList.add("is-hover"));
            el.addEventListener("mouseleave",()=> cursor.classList.remove("is-hover"));
        });
    }

    // Only a real mouse fires "mousemove" with movementX/Y support repeatedly
    // without a preceding touch event, so this reliably distinguishes mice
    // from touchscreens even on hybrid devices where CSS media queries lie.
    window.addEventListener("pointermove",(e)=>{
        if(e.pointerType !== "mouse") return;
        targetX = e.clientX;
        targetY = e.clientY;
        if(!active){
            currentX = targetX;
            currentY = targetY;
            activate();
        }
    });
    window.addEventListener("pointerdown",()=>{
        if(active) cursor.classList.add("is-active");
    });
    window.addEventListener("pointerup",()=>{
        cursor.classList.remove("is-active");
    });
    document.addEventListener("mouseleave",()=>{
        if(active) cursor.classList.remove("is-visible");
    });
    document.addEventListener("mouseenter",()=>{
        if(active) cursor.classList.add("is-visible");
    });

    function loop(){
        currentX += (targetX - currentX) * 0.2;
        currentY += (targetY - currentY) * 0.2;
        cursor.style.transform = `translate(${currentX}px, ${currentY}px)`;
        requestAnimationFrame(loop);
    }
})();
</script>
</body>
